# xrd.yaml
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xredisconfigs.database.example.com
spec:
  group: database.example.com
  names:
    kind: XRedisConfig
    plural: xredisconfigs
  claimNames:
    kind: RedisConfig
    plural: redisconfigs
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              storageGB:
                type: integer
